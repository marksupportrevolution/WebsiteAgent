<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Google-style Search Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #202124;
      background: #fff;
    }

    .top {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      font-size: 14px;
    }

    .top a {
      color: #202124;
      text-decoration: none;
    }

    .top a:hover {
      text-decoration: underline;
    }

    .main {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      font-size: 82px;
      font-weight: 500;
      letter-spacing: -6px;
      margin-bottom: 28px;
    }

    .blue { color: #4285f4; }
    .red { color: #ea4335; }
    .yellow { color: #fbbc05; }
    .green { color: #34a853; }

    .search-box {
      width: min(580px, 90vw);
      height: 46px;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      box-shadow: none;
    }

    .search-box:hover {
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
      border-color: transparent;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      margin-left: 10px;
    }

    .buttons {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }

    .buttons button {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .buttons button:hover {
      border: 1px solid #dadce0;
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #f2f2f2;
      color: #70757a;
      font-size: 14px;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      padding: 14px 28px;
      border-top: 1px solid #dadce0;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-links a {
      color: #70757a;
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <nav class="top">
    <a href="#">Gmail</a>
    <a href="#">Images</a>
    <a href="#">Apps</a>
    <a href="#">Sign in</a>
  </nav>

  <main class="main">
    <div class="logo" aria-label="Google-style logo">
      <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span><span class="blue">g</span><span class="green">l</span><span class="red">e</span>
    </div>

    <form action="https://www.google.com/search" method="get">
      <div class="search-box">
        🔍
        <input type="text" name="q" aria-label="Search" />
      </div>

      <div class="buttons">
        <button type="submit">Google Search</button>
        <button type="button">I'm Feeling Lucky</button>
      </div>
    </form>
  </main>

  <footer>
    <div class="footer-row">
      <div class="footer-links">
        <a href="#">About</a>
        <a href="#">Advertising</a>
        <a href="#">Business</a>
      </div>
      <div class="footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </div>
  </footer>
</body>
</html>
